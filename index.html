<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant personnalisation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f6f7; --surface: #fff; --border: #e1e3e5; --text: #202223; --text-sub: #6d7175;
      --primary: #008060; --primary-hover: #006e52; --critical: #d82c0d;
      --critical-bg: #fff4f4; --critical-border: #fead9a;
      --warning: #b98900; --warning-bg: #fff5ea;
      --success: #008060; --success-bg: #f1f8f5; --info-bg: #f4f6f8;
      --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.1); --header-height: 56px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Login */
    #login-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9000; align-items: center; justify-content: center; }
    #login-screen.show { display: flex; }
    .login-box { background: var(--surface); border-radius: 12px; padding: 40px; width: min(400px, 94vw); box-shadow: 0 8px 40px rgba(0,0,0,.15); text-align: center; }
    .login-box h1 { font-size: 24px; margin-bottom: 8px; }
    .login-box p { color: var(--text-sub); margin-bottom: 28px; font-size: 14px; }
    .login-box input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 16px; margin-bottom: 12px; text-align: center; letter-spacing: 2px; }
    .login-box input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .login-error { color: var(--critical); font-size: 13px; margin-top: 8px; display: none; }

    #topbar { position: sticky; top: 0; z-index: 200; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: var(--header-height); display: flex; align-items: center; gap: 8px; box-shadow: var(--shadow); }
    #topbar h1 { font-size: 16px; font-weight: 600; flex: 1; }

    .tabs { display: flex; gap: 4px; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; overflow-x: auto; }
    .tab-btn { padding: 12px 16px; border: none; background: none; cursor: pointer; font-size: 14px; color: var(--text-sub); border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s, border-color .15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab-btn .badge { display: inline-block; border-radius: 10px; font-size: 11px; padding: 0 6px; margin-left: 4px; line-height: 18px; }
    .tab-badge-urgent { background: var(--critical); color: #fff; }
    .tab-badge-total { background: var(--success-bg); color: var(--success); border: 1px solid #95c9b4; }

    #content { flex: 1; padding: 16px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .card + .card { margin-top: 12px; }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; cursor: pointer; transition: box-shadow .15s, transform .1s; box-shadow: var(--shadow); }
    .stat-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); transform: translateY(-1px); }
    .stat-card .stat-label { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; }
    .stat-card .stat-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .stat-card.urgent { border-color: var(--critical); background: var(--critical-bg); }
    .stat-card.urgent .stat-value { color: var(--critical); }

    .notes-list { display: flex; flex-direction: column; gap: 8px; }
    .note-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; background: var(--critical-bg); border: 1px solid var(--critical-border); border-radius: var(--radius); }
    .note-order { font-weight: 700; font-size: 13px; color: var(--critical); white-space: nowrap; }
    .note-text { flex: 1; font-size: 13px; color: var(--text); }
    .note-age { font-size: 11px; white-space: nowrap; }

    #order-sticky { position: sticky; top: var(--header-height); z-index: 100; background: var(--surface); border-bottom: 2px solid var(--border); padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .order-sticky-top { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .order-sticky-top h2 { font-size: 18px; font-weight: 700; }
    .prep-list { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .prep-label { font-size: 12px; color: var(--text-sub); font-weight: 600; margin-right: 4px; }
    .prep-item { background: var(--info-bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; white-space: nowrap; }

    .nav-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .nav-bar select { flex: 1; min-width: 160px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; background: var(--surface); cursor: pointer; }
    .nav-bar .counter { color: var(--text-sub); font-size: 13px; white-space: nowrap; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; white-space: nowrap; text-decoration: none; }
    .btn:hover { background: #f6f6f7; }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn-critical { background: var(--critical); color: #fff; border-color: var(--critical); }
    .btn-lg { padding: 12px 24px; font-size: 16px; font-weight: 600; width: 100%; justify-content: center; }
    .btn-warning { background: var(--warning-bg); color: var(--warning); border-color: var(--warning); }

    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .badge-critical { background: var(--critical-bg); color: var(--critical); border: 1px solid var(--critical-border); }
    .badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid #f1c84b; }
    .badge-success { background: var(--success-bg); color: var(--success); border: 1px solid #95c9b4; }
    .badge-info { background: var(--info-bg); color: var(--text); border: 1px solid var(--border); }

    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius); margin-bottom: 12px; }
    .alert-critical { background: var(--critical-bg); border: 1px solid var(--critical-border); }
    .alert-critical strong { color: var(--critical); }
    .alert-warning { background: var(--warning-bg); border: 1px solid #f1c84b; }
    .alert-warning strong { color: var(--warning); }
    .alert .alert-text { color: var(--text); }

    .lineitem-grid { display: grid; grid-template-columns: 56px 1fr 120px; gap: 16px; align-items: start; }
    .qty-cell { text-align: center; }
    .qty-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .qty-label { font-size: 11px; color: var(--text-sub); }
    .product-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .product-variant, .product-sku { color: var(--text-sub); font-size: 13px; margin-bottom: 2px; }
    .attr-item { font-size: 12px; color: var(--text-sub); }
    .dl-link { font-size: 13px; color: var(--primary); text-decoration: none; margin-top: 6px; display: inline-block; }
    .img-cell img { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); object-fit: contain; aspect-ratio: 1/1; display: block; cursor: zoom-in; }

    /* Supplier workflow */
    .workflow-steps { display: flex; flex-direction: column; gap: 16px; }
    .step { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .step-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .step-number { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); color: #fff; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .step-number.done { background: var(--success); }
    .step-number.locked { background: var(--border); color: var(--text-sub); }
    .step-title { font-weight: 600; font-size: 15px; }
    .step-desc { font-size: 13px; color: var(--text-sub); }
    .step-body { padding: 16px; background: var(--surface); }
    .step-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .order-count-badge { background: var(--info-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; font-size: 13px; margin-bottom: 12px; }
    .order-count-badge strong { font-size: 18px; color: var(--primary); }

    /* Print tab */
    .print-order-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .print-order-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); transition: background .15s; }
    .print-order-item:hover { background: var(--bg); }
    .print-order-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); flex-shrink: 0; }
    .print-order-item.deselected { opacity: .5; }
    .print-order-info { flex: 1; }
    .print-order-name { font-weight: 700; font-size: 14px; }
    .print-order-detail { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
    .print-order-note { font-size: 12px; color: var(--critical); margin-top: 4px; font-style: italic; }
    .print-order-files { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    .zip-result { background: var(--success-bg); border: 1px solid #95c9b4; border-radius: var(--radius); padding: 16px; margin-top: 12px; }
    .zip-result a { color: var(--primary); font-weight: 600; }

    #img-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
    #img-modal.open { display: flex; }
    #img-modal img { max-width: 92vw; max-height: 92vh; border-radius: 10px; object-fit: contain; cursor: default; }
    #img-modal-close { position: absolute; top: 16px; right: 20px; background: rgba(255,255,255,.2); border: none; color: #fff; font-size: 28px; cursor: pointer; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

    #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 8888; align-items: center; justify-content: center; }
    #settings-modal.open { display: flex; }
    .settings-box { background: var(--surface); border-radius: 12px; padding: 28px; width: min(500px, 94vw); box-shadow: 0 8px 40px rgba(0,0,0,.2); max-height: 90vh; overflow-y: auto; }
    .settings-box h2 { font-size: 18px; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; }
    .form-group input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .settings-hint { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
    .settings-section { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .5px; margin: 16px 0 8px; border-top: 1px solid var(--border); padding-top: 12px; }

    .spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; gap: 12px; color: var(--text-sub); }
    .spinner-ring { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 48px; color: var(--text-sub); }
    kbd { background: var(--info-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-size: 11px; font-family: monospace; }
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table th, .history-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
    .history-table th { font-weight: 600; background: var(--bg); color: var(--text-sub); font-size: 12px; text-transform: uppercase; }
    .history-table tr:last-child td { border-bottom: none; }
    .history-table tr:hover td { background: var(--bg); }

    #scroll-top { position: fixed; bottom: 24px; right: 24px; width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: #fff; border: none; font-size: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,128,96,.4); display: none; align-items: center; justify-content: center; z-index: 300; }
    #scroll-top.visible { display: flex; }
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: all .25s; z-index: 500; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .lineitem-grid { grid-template-columns: 48px 1fr 80px; gap: 10px; }
      .qty-num { font-size: 22px; }
      #content { padding: 10px; }
      .dashboard-grid { grid-template-columns: 1fr 1fr; }
    }
  /* ── Supplier notes block ── */
  .supplier-notes-block {
    margin-top: 14px;
    border: 1px solid #f1c84b;
    border-radius: 6px;
    overflow: hidden;
    max-width: 100%;
  }
  .supplier-notes-header {
    background: #fdf8ec;
    color: #7a5600;
    font-weight: 600;
    font-size: 13px;
    padding: 10px 14px;
    border-bottom: 1px solid #f1c84b;
  }
  .supplier-note-row {
    display: grid;
    grid-template-columns: 70px 160px 1fr;
    gap: 10px;
    align-items: baseline;
    padding: 9px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    background: #fffdf5;
  }
  .supplier-note-row:last-child { border-bottom: none; }
  .supplier-note-order { font-weight: 700; color: var(--text); white-space: nowrap; }
  .supplier-note-client { color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .supplier-note-text { color: #7a5600; line-height: 1.5; }

  </style>
</head>
<body>
<div id="app">

  <div id="login-screen">
    <div class="login-box">
      <h1>🎨 Assistant perso</h1>
      <p>Accès réservé — entre le mot de passe</p>
      <input id="login-input" type="password" placeholder="••••••••" />
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;" onclick="tryLogin()">Connexion</button>
      <div id="login-error" class="login-error">Mot de passe incorrect</div>
    </div>
  </div>

  <div id="img-modal" onclick="closeImgModal()">
    <button id="img-modal-close" onclick="closeImgModal()">✕</button>
    <img id="img-modal-src" src="" alt="" onclick="event.stopPropagation()" />
  </div>

  <div id="settings-modal">
    <div class="settings-box">
      <h2>⚙️ Configuration</h2>
      <div class="settings-section">Proxy Vercel</div>
      <div class="form-group">
        <label>URL du proxy Vercel</label>
        <input id="cfg-proxy-url" type="text" placeholder="https://shopify-prep-app.vercel.app/api/shopify" />
      </div>
      <div class="form-group">
        <label>Mot de passe app</label>
        <input id="cfg-password" type="password" placeholder="••••••••" />
        <div class="settings-hint">Correspond à APP_PASSWORD dans Vercel</div>
      </div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <button class="btn btn-primary" onclick="saveSettings()">Sauvegarder</button>
        <button class="btn" onclick="closeSettings()">Annuler</button>
      </div>
    </div>
  </div>

  <div id="topbar">
    <h1>🎨 Assistant personnalisation</h1>
    <button class="btn" onclick="openSettings()">⚙️</button>
    <button class="btn" onclick="logout()" title="Déconnexion">🔒</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">Tableau de bord</button>
    <button class="tab-btn" data-tab="custom" onclick="switchTab('custom')">Commandes custom <span id="tab-custom-badge" class="tab-badge-urgent badge" style="display:none"></span><span id="tab-custom-badge-total" class="tab-badge-total badge" style="display:none"></span></button>
    <button class="tab-btn" data-tab="supplier" onclick="switchTab('supplier')">Commande fournisseur <span id="tab-supplier-badge" class="tab-badge-total badge" style="display:none"></span></button>
    <button class="tab-btn" data-tab="print" onclick="switchTab('print')">🖨️ Impression <span id="tab-print-badge" class="tab-badge-total badge" style="display:none"></span></button>
  </div>

  <div id="content"></div>
</div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div id="toast"></div>

<script>
const state = {
  activeTab: 'dashboard',
  proxyUrl: '', appPassword: '', shop: '',
  isLoggedIn: false,
  orders: [], pageInfo: null, currentIndex: 0, filterUrgent: false, currentCursor: null, currentDirection: 'forward',
  supplierOrders: [], supplierSnapshot: [],
  // Print tab
  printOrders: [],       // commandes TODOPRINT avec métafields teeinblue
  printSelected: new Set(), // IDs sélectionnés
  printZipDone: false,
  printZipOrderIds: [],  // IDs des commandes zippées (pour suppression tag)
};

const HIDDEN_KEYS = ['_tib_design_link_1', '_customization_image', '_customization_id'];

// ════════════════════════════════════════════
// AUTH & SETTINGS
// ════════════════════════════════════════════
function loadSettings() {
  state.proxyUrl = localStorage.getItem('proxyUrl') || '';
  state.appPassword = localStorage.getItem('appPassword') || '';
  // Extraire le shop depuis l'URL proxy
  const proxyHost = (localStorage.getItem('proxyUrl') || '').replace('https://','').split('/')[0];
  state.shop = localStorage.getItem('shop') || proxyHost.replace('.vercel.app','') || '';

  state.isLoggedIn = sessionStorage.getItem('loggedIn') === '1';
}

function checkAuth() {
  if (!state.isLoggedIn) { document.getElementById('login-screen').classList.add('show'); return false; }
  return true;
}

async function tryLogin() {
  const input = document.getElementById('login-input');
  const pwd = input.value.trim();
  if (!pwd) return;
  try {
    const res = await fetch(state.proxyUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-App-Password': pwd },
      body: JSON.stringify({ query: '{ shop { name } }', variables: {} }),
    });
    if (res.status === 401) { document.getElementById('login-error').style.display = 'block'; input.value = ''; return; }
    state.appPassword = pwd;
    localStorage.setItem('appPassword', pwd);
    sessionStorage.setItem('loggedIn', '1');
    state.isLoggedIn = true;
    document.getElementById('login-screen').classList.remove('show');
    document.getElementById('login-error').style.display = 'none';
    renderDashboard();
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Erreur de connexion — vérifie l\'URL proxy';
  }
}

function logout() { sessionStorage.removeItem('loggedIn'); state.isLoggedIn = false; document.getElementById('login-screen').classList.add('show'); document.getElementById('login-input').value = ''; }

function saveSettings() {
  const url = document.getElementById('cfg-proxy-url').value.trim();
  const pwd = document.getElementById('cfg-password').value.trim();

  if (!url) { showToast('⚠️ Remplis l\'URL proxy', 'warning'); return; }
  localStorage.setItem('proxyUrl', url); state.proxyUrl = url;
  if (pwd) { localStorage.setItem('appPassword', pwd); state.appPassword = pwd; }

  closeSettings();
  showToast('✅ Configuration sauvegardée');
}

function openSettings() {
  document.getElementById('cfg-proxy-url').value = state.proxyUrl;
  document.getElementById('cfg-password').value = '';

  document.getElementById('settings-modal').classList.add('open');
}
function closeSettings() { document.getElementById('settings-modal').classList.remove('open'); }

// ════════════════════════════════════════════
// GRAPHQL
// ════════════════════════════════════════════
async function gql(query, variables = {}) {
  const res = await fetch(state.proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-App-Password': state.appPassword },
    body: JSON.stringify({ query, variables }),
  });
  if (res.status === 401) { logout(); throw new Error('Session expirée'); }
  if (!res.ok) throw new Error(`Proxy error ${res.status}`);
  const json = await res.json();
  if (json.errors?.length) throw new Error(json.errors.map(e => e.message).join(', '));
  return json.data;
}

async function callGas(orders) {
  // Appel via proxy Vercel
  const res = await fetch(state.proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-App-Password': state.appPassword },
    body: JSON.stringify({ action: 'generateZip', orders }),
  });
  if (!res.ok) throw new Error(`Proxy error ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════
function switchTab(tab) {
  if (!checkAuth()) return;
  state.activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (!state.proxyUrl) {
    document.getElementById('content').innerHTML = `<div class="empty"><div style="font-size:48px;margin-bottom:16px;">⚙️</div><button class="btn btn-primary" onclick="openSettings()">Configurer</button></div>`;
    return;
  }
  if (tab === 'custom') renderCustomTab(true);
  else ({ dashboard: renderDashboard, supplier: renderSupplierTab, print: renderPrintTab })[tab]?.();
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = type === 'warning' ? '#b98900' : type === 'error' ? '#d82c0d' : '#008060';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800);
}
window.addEventListener('scroll', () => document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 200));
function openImgModal(url) { document.getElementById('img-modal-src').src = url; document.getElementById('img-modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeImgModal() { document.getElementById('img-modal').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeImgModal(); return; }
  if (state.activeTab !== 'custom') return;
  if (['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  if (document.getElementById('img-modal').classList.contains('open')) return;

});

    const [countsData, notesData] = await Promise.all([

        toorder: ordersCount(query: "tag:TOORDER AND status:open") { count }
        todoprint: ordersCount(query: "tag:TODOPRINT AND status:open") { count }
        urgent: ordersCount(query: "(tag:urgent OR tag:URGENT) AND status:open") { count }
      }`),
      gql(`query {
        orders(first: 50, query: "tag:custom AND status:open AND (fulfillment_status:unshipped OR fulfillment_status:partial)") {

    if (counts.custom > 0) badgeTotal.textContent = counts.custom;
    // Fournisseur (vert)
    badgeSupplier.style.display = counts.toorder > 0 ? '' : 'none';
    if (counts.toorder > 0) badgeSupplier.textContent = counts.toorder;

    const ordersWithNotes = notesData.orders.edges.map(e => e.node).filter(o => o.note?.trim());
    const ageD = d => Math.floor((Date.now() - new Date(d).getTime()) / 86400000);

    const notesHtml = ordersWithNotes.length === 0

          const customer = o.customer ? `${o.customer.firstName||''} ${o.customer.lastName||''}`.trim() : '';

            <span class="note-text">${customer ? `<strong>${customer}</strong> — ` : ''}${o.note}</span>
            <span class="note-age" style="color:${ageColor}">${age}j</span>

      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button class="btn" onclick="renderDashboard()">↺ Actualiser</button>
      </div>
      <div class="dashboard-grid">
        <div class="stat-card" onclick="goToCustom(false)"><div class="stat-label">Commandes custom</div><div class="stat-value">${counts.custom}</div><div class="stat-sub">À traiter</div></div>
        <div class="stat-card" onclick="switchTab('supplier')"><div class="stat-label">Import fournisseur</div><div class="stat-value">${counts.toorder}</div><div class="stat-sub">Balise TOORDER</div></div>
        <div class="stat-card" onclick="switchTab('print')"><div class="stat-label">Préparation impression</div><div class="stat-value">${counts.todoprint}</div><div class="stat-sub">Balise TODOPRINT</div></div>
        <div class="stat-card ${counts.urgent > 0 ? 'urgent' : ''}" onclick="goToCustom(true)"><div class="stat-label">Commandes urgentes</div><div class="stat-value">${counts.urgent}</div><div class="stat-sub">Balise urgent / URGENT</div></div>

function goToCustom(urgent) { state.filterUrgent = urgent; switchTab('custom'); }

// ════════════════════════════════════════════
// CUSTOM ORDERS
// ════════════════════════════════════════════
const ORDER_FIELDS = `id name createdAt note tags customer { firstName lastName }
  lineItems(first: 250) { edges { node { id title quantity
    variant { title
      customizationImage: metafield(namespace: "teeinblue", key: "customization_image") { value }
      imbretexSku: metafield(namespace: "custom", key: "imbretex_sku") { value }
    }
    customAttributes { key value }
  }}}`;

async function fetchCustomOrders(cursor = null, direction = 'forward', urgent = false) {
  const base = 'tag:custom AND status:open AND (fulfillment_status:unshipped OR fulfillment_status:partial)';
  const data = await gql(`query($first: Int, $after: String, $last: Int, $before: String, $q: String!) {
    orders(first: $first, after: $after, last: $last, before: $before, query: $q) {
      edges { node { ${ORDER_FIELDS} } }
      pageInfo { hasNextPage hasPreviousPage startCursor endCursor }
    }
  }`, {
    first: direction === 'forward' ? 10 : null, after: direction === 'forward' ? cursor : null,
    last: direction !== 'forward' ? 10 : null, before: direction !== 'forward' ? cursor : null,
    q: urgent ? `${base} AND (tag:urgent OR tag:URGENT)` : base,
  });
  state.orders = data.orders.edges.map(e => e.node);
  state.pageInfo = data.orders.pageInfo;
  state.currentIndex = 0;
  // Sauvegarde le curseur courant pour pouvoir revenir sur la même page
  state.currentCursor = cursor;
  state.currentDirection = direction;
}

async function renderCustomTab(restorePage = false) {
  document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>`;
  try {
    // Si on revient sur le tab, recharge la même page
    const cursor = restorePage ? state.currentCursor : null;
    const direction = restorePage ? state.currentDirection : 'forward';
    const savedId = restorePage ? state.orders[state.currentIndex]?.id : null;
    await fetchCustomOrders(cursor, direction, state.filterUrgent);
    if (savedId) { const idx = state.orders.findIndex(o => o.id === savedId); if (idx !== -1) state.currentIndex = idx; }
    renderOrderView();
  }
  catch(err) { document.getElementById('content').innerHTML = `<div class="alert alert-critical"><strong>Erreur :</strong> <span class="alert-text">${err.message}</span></div>`; }
}

function getOrderStatusBadges(tags) {
  const badges = [];

  // ── Statut impression ──
  const printTag = tags.find(t => /^print_\d{8}$/.test(t));
  if (printTag) {
    const d = printTag.replace('print_','');
    badges.push({ label: `✅ Imprimé le ${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}`, tone: 'success' });
  } else if (tags.includes('TODOPRINT')) {
    badges.push({ label: '🖨️ Impression à lancer', tone: 'warning' });
  }

  // ── Statut commande fournisseur ──
  const orderTag = tags.find(t => /^order_\d{8}$/.test(t));
  if (orderTag) {
    const d = orderTag.replace('order_','');
    badges.push({ label: `📦 Commandé le ${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}`, tone: 'info' });
  } else if (tags.includes('TOORDER')) {
    badges.push({ label: '⏳ À commander fournisseur', tone: 'warning' });
  }

  // Si aucun statut
  if (badges.length === 0) badges.push({ label: '🆕 Nouvelle commande', tone: 'info' });

  return badges;
}

function renderStatusBadges(tags) {
  const colors = { success: 'var(--success-bg)', warning: 'var(--warning-bg)', info: 'var(--info-bg)' };
  const borders = { success: '#95c9b4', warning: '#f1c84b', info: 'var(--border)' };
  const texts = { success: 'var(--success)', warning: 'var(--warning)', info: 'var(--text)' };
  return getOrderStatusBadges(tags).map(s =>
    `<span class="badge" style="background:${colors[s.tone]};border-color:${borders[s.tone]};color:${texts[s.tone]}">${s.label}</span>`
  ).join('');
}

function renderOrderView() {
  const c = document.getElementById('content');
  const order = state.orders[state.currentIndex] || null;
  const hasPrev = state.currentIndex > 0 || state.pageInfo?.hasPreviousPage;
  const hasNext = state.currentIndex < state.orders.length - 1 || state.pageInfo?.hasNextPage;
  const counter = state.orders.length === 0 ? 'Aucune commande' : `${state.currentIndex + 1} / ${state.orders.length}${state.pageInfo?.hasNextPage ? '+' : ''}`;

  let html = `<div class="nav-bar">
    <button class="btn" onclick="prevOrder()" ${!hasPrev ? 'disabled' : ''}>← Précédent <kbd>J</kbd></button>
    ${state.orders.length > 0 ? `<select onchange="jumpToOrder(this.value)">${state.orders.map((o, i) => {
      const urg = o.tags.some(t => t==='urgent'||t==='URGENT'); const note = !!(o.note?.trim());
      return `<option value="${i}" ${i===state.currentIndex?'selected':''}>${o.name}${urg?' 🚨':''}${note?' 📝':''}</option>`;
    }).join('')}</select>` : ''}
    <span class="counter">${counter}</span>
    <button class="btn" onclick="nextOrder()" ${!hasNext ? 'disabled' : ''}>Suivant <kbd>K</kbd> →</button>
    <button class="btn ${state.filterUrgent ? 'btn-critical' : 'btn-warning'}" onclick="toggleUrgentFilter()">🚨 Urgent${state.filterUrgent?' ✕':''}</button>
    ${state.filterUrgent ? '<span class="badge badge-critical">Filtre actif</span>' : ''}
  </div>`;

  if (!state.orders.length) { html += `<div class="empty">${state.filterUrgent ? 'Aucune commande urgente.' : 'Aucune commande custom à traiter.'}</div>`; c.innerHTML = html; return; }
  if (!order) { c.innerHTML = html; return; }

  const isUrgent = order.tags.some(t => t==='urgent'||t==='URGENT');
  const hasNote = !!(order.note?.trim());
  const customerName = order.customer ? `${order.customer.firstName||''} ${order.customer.lastName||''}`.trim() : '';
  const orderDate = new Date(order.createdAt).toLocaleDateString('fr-FR');
  const totalQty = order.lineItems.edges.reduce((s,{node:li}) => s+li.quantity, 0);
  const ageInDays = Math.floor((Date.now() - new Date(order.createdAt).getTime()) / 86400000);
  const ageTone = ageInDays < 5 ? 'success' : ageInDays <= 10 ? 'warning' : 'critical';
  const ageLabel = ageInDays < 5 ? 'Récente' : ageInDays <= 10 ? 'En retard' : 'Critique';
  const prepItems = order.lineItems.edges.map(({node:li}) => {
    const v = li.variant?.title; const sv = v && v!=='Default Title';
    return `<span class="prep-item"><strong>${li.quantity}×</strong> ${li.title}${sv?` — ${v}`:''}</span>`;
  }).join('');

  html += `<div id="order-sticky">
    <div class="order-sticky-top">
      <h2>${order.name}</h2>
      ${isUrgent ? '<span class="badge badge-critical">🚨 URGENT</span>' : ''}
      <span class="badge badge-info">${customerName||'-'}</span>
      <span class="badge badge-info">${orderDate}</span>
      <span class="badge badge-${ageTone}">${ageInDays}j — ${ageLabel}</span>
      <span class="badge badge-info">${totalQty} article${totalQty>1?'s':''}</span>
      ${renderStatusBadges(order.tags)}
      <a href="https://therxshop.myshopify.com/admin/orders/${order.id.split('/').pop()}" target="_blank" class="btn" style="margin-left:auto;font-size:12px;padding:4px 10px;">🔗 Voir dans Shopify</a>
    </div>
    ${hasNote ? `<div class="alert alert-critical" style="margin-bottom:8px;">⚠️ <strong>Note : </strong><span class="alert-text">${order.note}</span></div>` : ''}
    <div class="prep-list"><span class="prep-label">À préparer :</span>${prepItems}</div>
  </div>
  <div style="margin-top:12px;display:flex;flex-direction:column;gap:12px;">`;

  for (const {node:li} of order.lineItems.edges) {
    const variant = li.variant?.title || '';
    const showVariant = variant && variant !== 'Default Title';
    const imgAttr = li.customAttributes.find(a => a.key === '_customization_image');
    const teeinblue = li.variant?.customizationImage?.value || null;
    const imageUrl = imgAttr?.value || teeinblue || null;
    const sku = li.variant?.imbretexSku?.value || null;
    const visibleAttrs = li.customAttributes.filter(a => !HIDDEN_KEYS.includes(a.key));
    html += `<div class="card"><div class="lineitem-grid">
      <div class="qty-cell"><div class="qty-num">${li.quantity}</div><div class="qty-label">Qté</div></div>
      <div>
        <div class="product-title">${li.title}</div>
        ${showVariant ? `<div class="product-variant">${variant}</div>` : ''}
        ${sku ? `<div class="product-sku">SKU: ${sku}</div>` : ''}
        ${visibleAttrs.map(a => `<div class="attr-item">${a.key}: ${a.value}</div>`).join('')}
        ${imageUrl ? `<a href="${imageUrl}" class="dl-link" target="_blank" download>⬇ Télécharger l'image</a>` : ''}
      </div>
      <div class="img-cell">${imageUrl ? `<img src="${imageUrl}" alt="${li.title}" onclick="openImgModal('${imageUrl}')" loading="lazy"/>` : ''}</div>
    </div></div>`;
  }
  html += `</div>`;
  if (hasNext) html += `<div style="margin-top:20px;"><button class="btn btn-primary btn-lg" onclick="nextOrderAndScroll()">Commande suivante → <kbd style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff;">K</kbd></button></div>`;
  c.innerHTML = html;
}

async function prevOrder() {
  if (state.currentIndex > 0) { state.currentIndex--; renderOrderView(); window.scrollTo({top:0,behavior:'smooth'}); }
  else if (state.pageInfo?.hasPreviousPage) {
    document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>`;
    try { await fetchCustomOrders(state.pageInfo.startCursor, 'backward', state.filterUrgent); state.currentIndex = state.orders.length-1; renderOrderView(); window.scrollTo({top:0,behavior:'smooth'}); }
    catch(e) { showToast('Erreur: '+e.message, 'error'); }
  }
}
async function nextOrder() {
  if (state.currentIndex < state.orders.length-1) { state.currentIndex++; renderOrderView(); }
  else if (state.pageInfo?.hasNextPage) {
    document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>`;
    try { await fetchCustomOrders(state.pageInfo.endCursor, 'forward', state.filterUrgent); renderOrderView(); }
    catch(e) { showToast('Erreur: '+e.message, 'error'); }
  }
}
async function nextOrderAndScroll() { await nextOrder(); window.scrollTo({top:0,behavior:'smooth'}); }
function jumpToOrder(idx) { state.currentIndex = parseInt(idx); renderOrderView(); window.scrollTo({top:0,behavior:'smooth'}); }
async function toggleUrgentFilter() {
  state.filterUrgent = !state.filterUrgent;
  document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>`;
  try { await fetchCustomOrders(null, 'forward', state.filterUrgent); renderOrderView(); }
  catch(e) { document.getElementById('content').innerHTML = `<div class="alert alert-critical"><strong>Erreur :</strong> ${e.message}</div>`; }
}

window.addEventListener('focus', () => {
  if (state.activeTab !== 'custom' || !state.proxyUrl || !state.isLoggedIn) return;
  const savedId = state.orders[state.currentIndex]?.id;
  // Recharge la même page grâce au curseur sauvegardé
  fetchCustomOrders(state.currentCursor, state.currentDirection, state.filterUrgent).then(() => {
    if (savedId) { const idx = state.orders.findIndex(o => o.id === savedId); if (idx !== -1) state.currentIndex = idx; }
    renderOrderView();
  }).catch(() => {});
});

// SUPPLIER TAB
// ════════════════════════════════════════════
async function fetchToOrderOrders() {
  let orders=[], hasNext=true, cursor=null;
  while (hasNext) {
    const data = await gql(`query($first:Int!,$after:String,$q:String!){orders(first:$first,after:$after,query:$q){edges{node{id name createdAt note customer{firstName lastName}lineItems(first:250){edges{node{id title quantity variant{title imbretexSku:metafield(namespace:"custom",key:"imbretex_sku"){value}}}}}tags}}pageInfo{hasNextPage endCursor}}}`, {first:250,after:cursor,q:'tag:TOORDER AND status:open'});
    orders.push(...data.orders.edges.map(e=>e.node)); hasNext=data.orders.pageInfo.hasNextPage; cursor=data.orders.pageInfo.endCursor;
  }
  return orders;
}

async function renderSupplierTab() {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement...</div>`;
  try { state.supplierOrders = await fetchToOrderOrders(); state.supplierSnapshot = []; renderSupplierView(); loadHistory(); }
  catch(e) { c.innerHTML = `<div class="alert alert-critical"><strong>Erreur :</strong> ${e.message}</div>`; }
}

          <div><div class="step-title">Télécharger les fichiers de commande</div><div class="step-desc">Génère les fichiers à intégrer dans le panier fournisseur</div></div>

        <div class="step-body">

          ${renderSupplierNotes(state.supplierOrders)}

      </div>
      <div class="step">

        <div class="step-body">

        </div>
      </div>

    </div>`;
}

function renderSupplierNotes(orders) {
  const withNote = orders.filter(o => o.note && o.note.trim());
  if (withNote.length === 0) return '<div style="margin-top:12px;font-size:13px;color:var(--success);">✅ Aucune note sur ces commandes</div>';
  const rows = withNote.map(o => {
    const customer = `${o.customer?.firstName||''} ${o.customer?.lastName||''}`.trim() || '—';
    const note = o.note.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="supplier-note-row">
      <span class="supplier-note-order">${o.name}</span>
      <span class="supplier-note-client">${customer}</span>
      <span class="supplier-note-text">${note}</span>
    </div>`;
  }).join('');
  return `<div class="supplier-notes-block">
    <div class="supplier-notes-header">⚠️ ${withNote.length} commande${withNote.length>1?'s':''} avec note — à prendre en compte</div>
    ${rows}
  </div>`;
}

function downloadAndSnapshot(type) {
  state.supplierSnapshot = state.supplierOrders.map(o => o.id);
  const { url, filename } = type === 'imbretex' ? generateImbretex(state.supplierOrders) : generateComplete(state.supplierOrders);
  const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
  showToast(`✅ ${type === 'imbretex' ? 'Export IMBRETEX' : 'Export complet'} téléchargé`);
  renderSupplierView(); loadHistory();
}

async function previewStep2() {
  const preview = document.getElementById('step2-preview');
  preview.innerHTML = `<div class="spinner" style="padding:16px;"><div class="spinner-ring"></div>Vérification...</div>`;
  try {
    const currentOrders = await fetchToOrderOrders();
    const snapshotIds = new Set(state.supplierSnapshot);
    const toValidate = currentOrders.filter(o => snapshotIds.has(o.id));
    const newOrders = currentOrders.filter(o => !snapshotIds.has(o.id));
    let html = '';
    if (newOrders.length > 0) {
      html += `<div class="alert alert-warning" style="margin-bottom:12px;">⚠️ <strong>${newOrders.length} nouvelle${newOrders.length>1?'s':''} commande${newOrders.length>1?'s':''}</strong><span class="alert-text"> exclue${newOrders.length>1?'s':''} : ${newOrders.map(o=>`<strong>${o.name}</strong>`).join(', ')}</span></div>`;
    }
    html += `<div style="margin-bottom:12px;font-size:14px;"><strong>${toValidate.length}</strong> commande${toValidate.length>1?'s':''} à valider : ${toValidate.map(o=>`<span class="badge badge-info" style="margin:2px;">${o.name}</span>`).join('')}</div>`;
    if (toValidate.length > 0) html += `<button class="btn btn-primary" onclick='validateSupplierOrders(${JSON.stringify(toValidate.map(o=>o.id))})'>✅ Valider ${toValidate.length} commande${toValidate.length>1?'s':''}</button>`;
    preview.innerHTML = html;
  } catch(e) { preview.innerHTML = `<div class="alert alert-critical"><strong>Erreur :</strong> ${e.message}</div>`; }
}

async function validateSupplierOrders(orderIds) {
  const btn = event.target; btn.disabled = true; btn.textContent = 'Validation...';
  const today = new Date();
  const newTag = `order_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  const removeMut = `mutation($id:ID!,$tags:[String!]!){tagsRemove(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  const addMut = `mutation($id:ID!,$tags:[String!]!){tagsAdd(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  let ok=0, errors=[];
  for (const id of orderIds) {
    try { await gql(removeMut,{id,tags:['TOORDER']}); await gql(addMut,{id,tags:[newTag]}); ok++; }
    catch(e) { errors.push(id); }
  }
  if (errors.length) showToast(`⚠️ Erreurs sur ${errors.length} commande(s)`, 'warning');
  else showToast(`✅ ${ok} commande(s) validée(s) — tag ${newTag} ajouté`);
  state.supplierSnapshot = [];
  // Recharge complète du tab pour refléter le nouvel état
  document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Mise à jour...</div>`;
  state.supplierOrders = await fetchToOrderOrders();
  // Mise à jour du badge
  const badgeSupplier = document.getElementById('tab-supplier-badge');
  if (badgeSupplier) {
    if (state.supplierOrders.length > 0) { badgeSupplier.textContent = state.supplierOrders.length; badgeSupplier.style.display = ''; }
    else { badgeSupplier.style.display = 'none'; }
  }
  renderSupplierView();
  loadHistory();
}

function generateImbretex(orders, dateOverride = null) {
  const skuMap = new Map();
  orders.forEach(o => o.lineItems.edges.forEach(({node:li}) => {
    const sku = li.variant?.imbretexSku?.value; if (sku) skuMap.set(sku, (skuMap.get(sku)||0) + li.quantity);
  }));
  const today = dateOverride ? new Date(parseInt(dateOverride.substring(0,4)),parseInt(dateOverride.substring(4,6))-1,parseInt(dateOverride.substring(6,8))) : new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  let csv = 'REFERENCE ARTICLE;QUANTITE;DOSSIER (FACULTATIF)\n';
  skuMap.forEach((qty,sku) => { csv += `${sku};${qty};custom_${dateStr.replace(/-/g,'')}\n`; });
  return { url: `data:text/csv;charset=utf-8,${encodeURIComponent(csv)}`, filename: `commande-imbretex-${dateStr}.csv` };
}

function generateComplete(orders, dateOverride = null) {
  let csv = 'Numéro commande;Date;Client;Produit;Variant;Quantité;imbretex_sku;Notes commande\n';
  orders.forEach(o => {
    const date = new Date(o.createdAt).toLocaleDateString('fr-FR');
    const customer = o.customer ? `${o.customer.firstName||''} ${o.customer.lastName||''}`.trim() : '';
    const notes = (o.note||'').replace(/;/g,',').replace(/\n/g,' ');
    o.lineItems.edges.forEach(({node:li}) => { csv += `${o.name};${date};${customer};${li.title};${li.variant?.title||''};${li.quantity};${li.variant?.imbretexSku?.value||''};${notes}\n`; });
  });
  const today = dateOverride ? new Date(parseInt(dateOverride.substring(0,4)),parseInt(dateOverride.substring(4,6))-1,parseInt(dateOverride.substring(6,8))) : new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  return { url: `data:text/csv;charset=utf-8,${encodeURIComponent(csv)}`, filename: `resume-commandes-${dateStr}.csv` };
}

async function loadHistory() {
  const el = document.getElementById('history-content'); if (!el) return;
  try {
    let orders=[], hasNext=true, cursor=null;
    while(hasNext){const data=await gql(`query($first:Int!,$after:String){orders(first:$first,after:$after){edges{node{id tags}}pageInfo{hasNextPage endCursor}}}`,{first:250,after:cursor});orders.push(...data.orders.edges.map(e=>e.node));hasNext=data.orders.pageInfo.hasNextPage;cursor=data.orders.pageInfo.endCursor;}
    const tagMap = new Map();
    orders.forEach(o => o.tags.forEach(t => { if(t.startsWith('order_')) tagMap.set(t,(tagMap.get(t)||0)+1); }));
    const tags = [...tagMap.entries()].map(([tag,count]) => { const d=tag.replace('order_',''); return d.length===8?{tag,count,date:`${d.slice(6,8)}/${d.slice(4,6)}/${d.slice(0,4)}`}:null; }).filter(Boolean).sort((a,b)=>b.tag.localeCompare(a.tag));
    if (!tags.length) { el.innerHTML = `<div style="color:var(--text-sub);font-size:13px;">Aucun historique.</div>`; return; }
    el.innerHTML = `<table class="history-table"><thead><tr><th>Date</th><th>Commandes</th><th>Actions</th></tr></thead><tbody>${tags.map(h=>`<tr><td><strong>${h.date}</strong></td><td>${h.count}</td><td><div style="display:flex;gap:6px;flex-wrap:wrap;"><button class="btn" onclick="regenAndDownload('${h.tag}','imbretex')">↺ IMBRETEX</button><button class="btn" onclick="regenAndDownload('${h.tag}','complete')">↺ Complet</button></div></td></tr>`).join('')}</tbody></table>`;
  } catch(e) { if(el) el.innerHTML = `<div style="color:var(--text-sub);font-size:13px;">Erreur historique.</div>`; }
}

async function regenAndDownload(tag, type) {
  try {
    let orders=[], hasNext=true, cursor=null;
    while(hasNext){const data=await gql(`query($first:Int!,$after:String,$q:String!){orders(first:$first,after:$after,query:$q){edges{node{id name createdAt note customer{firstName lastName}lineItems(first:250){edges{node{id title quantity variant{title imbretexSku:metafield(namespace:"custom",key:"imbretex_sku"){value}}}}}tags}}pageInfo{hasNextPage endCursor}}}`,{first:250,after:cursor,q:`tag:${tag} AND status:open`});orders.push(...data.orders.edges.map(e=>e.node));hasNext=data.orders.pageInfo.hasNextPage;cursor=data.orders.pageInfo.endCursor;}
    const dateStr = tag.replace('order_','');
    const {url,filename} = type==='imbretex'?generateImbretex(orders,dateStr):generateComplete(orders,dateStr);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    showToast(`✅ Téléchargé`);
  } catch(e) { showToast('Erreur: '+e.message,'error'); }
}

async function renderPrintTab() {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Chargement des commandes TODOPRINT...</div>`;
  try {
    // Récupère les commandes TODOPRINT avec métafields teeinblue
    let orders=[], hasNext=true, cursor=null;
    while(hasNext) {
      const data = await gql(`query($first:Int!,$after:String,$q:String!){
        orders(first:$first,after:$after,query:$q){
          edges{node{
            id name createdAt note tags
            customer{firstName lastName}
            lineItems(first:250){edges{node{
              id title quantity
              variant{title}
              customAttributes{key value}
            }}}
          }}
          pageInfo{hasNextPage endCursor}
        }
      }`, {first:50,after:cursor,q:'tag:TODOPRINT AND status:open'});
      orders.push(...data.orders.edges.map(e=>e.node));
      hasNext=data.orders.pageInfo.hasNextPage; cursor=data.orders.pageInfo.endCursor;
    }
    state.printOrders = orders;
    state.printSelected = new Set(orders.map(o => o.id));

    state.printZipOrderIds = [];
    renderPrintView();
  } catch(e) {
    c.innerHTML = `<div class="alert alert-critical"><strong>Erreur :</strong> ${e.message}</div>`;
  }
}

  const orders = state.printOrders;
  if (!orders.length) {
    c.innerHTML = `<div class="empty">Aucune commande avec la balise TODOPRINT.</div>`;
    return;
  }

  const selectedCount = state.printSelected.size;
  const ordersWithNotes = orders.filter(o => o.note?.trim() && state.printSelected.has(o.id));

  let html = `
    <div class="workflow-steps">

      <!-- ÉTAPE 1 : Sélection -->
      <div class="step">
        <div class="step-header">
          <div class="step-number ${state.printZipDone ? 'done' : ''}">1</div>
          <div>
            <div class="step-title">Sélectionner les commandes à préparer</div>
            <div class="step-desc" id="print-step1-desc">${orders.length} commande${orders.length>1?'s':''} avec balise TODOPRINT — ${selectedCount} sélectionnée${selectedCount>1?'s':''}</div>
          </div>
        </div>
        <div class="step-body">
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <button class="btn" onclick="printSelectAll()">✅ Tout sélectionner</button>
            <button class="btn" onclick="printDeselectAll()">☐ Tout désélectionner</button>
          </div>
          <div class="print-order-list">
            ${orders.map(o => {
              const isSelected = state.printSelected.has(o.id);
              const customer = o.customer ? `${o.customer.firstName||''} ${o.customer.lastName||''}`.trim() : '';
              const ageInDays = Math.floor((Date.now() - new Date(o.createdAt).getTime()) / 86400000);
              const totalQty = o.lineItems.edges.reduce((s,{node:li})=>s+li.quantity,0);
              // Compte les fichiers disponibles
              const fileCount = o.lineItems.edges.reduce((s,{node:li}) => {
                const attrs = Object.fromEntries((li.customAttributes||[]).map(a=>[a.key,a.value])); const designs = (attrs['All designs']||'').split(/[\s,]+/).filter(u=>u.startsWith('http'));
                const jsonUrls = extractPngSvgFromJson(attrs['Customization JSON']||'');
                return s + designs.length + jsonUrls.length;
              }, 0);
              return `<div class="print-order-item ${!isSelected?'deselected':''}" id="print-item-${o.id}">
                <input type="checkbox" ${isSelected?'checked':''} onchange="togglePrintOrder(this.dataset.id, this.checked)" data-id="${o.id}" />
                <div class="print-order-info">
                  <div class="print-order-name">${o.name} <span class="badge badge-info">${totalQty} art.</span> <span class="badge badge-info">${ageInDays}j</span></div>
                  <div class="print-order-detail">${customer||'—'} · ${o.lineItems.edges.length} ligne${o.lineItems.edges.length>1?'s':''} · ${fileCount} fichier${fileCount>1?'s':''}</div>
                  ${o.note?.trim() ? `<div class="print-order-note">📝 ${o.note}</div>` : ''}
                </div>
              </div>`;
            }).join('')}
          </div>
          ${ordersWithNotes.length > 0 ? `
          <div class="alert alert-warning" style="margin-top:12px;">
            📝 <strong>${ordersWithNotes.length} commande${ordersWithNotes.length>1?'s':''} avec note</strong> — incluses dans le notes.txt du ZIP
          </div>` : ''}
        </div>
      </div>

      <!-- ÉTAPE 2 : Génération ZIP -->
      <div class="step">

          <div class="step-number ${state.printZipDone ? 'done' : selectedCount === 0 ? 'locked' : ''}">2</div>

function extractPngSvgFromJson(jsonText) {
  if (!jsonText) return [];
  try {
    const obj = JSON.parse(jsonText);
    const found = [];
    (function walk(v) {
      if (!v) return;
      if (typeof v === 'string' && /^https?:\/\//i.test(v) && /\.(png|svg)(\?.*)?$/i.test(v)) found.push(v);
      else if (Array.isArray(v)) v.forEach(walk);
      else if (typeof v === 'object') Object.values(v).forEach(walk);
    })(obj);
    return [...new Set(found)];
  } catch {
    const re = /(https?:\/\/[^\s"'<>]+?\.(?:png|svg))(?:\?[^\s"'<>]*)?/ig;
    const out=[]; let m;
    while((m=re.exec(jsonText))!==null) out.push(m[0]);
    return [...new Set(out)];
  }
}

function togglePrintOrder(orderId, checked) {
  if (checked) state.printSelected.add(orderId);
  else state.printSelected.delete(orderId);
  // Mise à jour visuelle de la ligne
  const item = document.getElementById(`print-item-${orderId}`);
  if (item) item.classList.toggle('deselected', !checked);
  // Mise à jour du compteur partout
  updatePrintCounter();
}

function updatePrintCounter() {
  const n = state.printSelected.size;
  const total = state.printOrders.length;
  // Header étape 1
  const desc = document.getElementById('print-step1-desc');
  if (desc) desc.textContent = `${total} commande${total>1?'s':''} avec balise TODOPRINT — ${n} sélectionnée${n>1?'s':''}`;
  // Bouton générer
  const zipCount = document.getElementById('zip-count');
  if (zipCount) zipCount.textContent = n;
  const genBtn = document.getElementById('generate-zip-btn');
  if (genBtn) genBtn.disabled = n === 0;
}

function printSelectAll() { state.printOrders.forEach(o => state.printSelected.add(o.id)); renderPrintView(); }
function printDeselectAll() { state.printSelected.clear(); renderPrintView(); }

async function generatePrintZip() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Génération en cours... (peut prendre 1-2 min)';

  const selectedOrders = state.printOrders.filter(o => state.printSelected.has(o.id));

  // Prépare les données pour le GAS
  const gasOrders = [];
  for (const order of selectedOrders) {
    for (const {node:li} of order.lineItems.edges) {
      const liAttrs = Object.fromEntries((li.customAttributes||[]).map(a=>[a.key,a.value]));
      // Les URLs de design sont dans _tib_design_link_1, _tib_design_link_2, etc.
      const designUrls = Object.entries(liAttrs)
        .filter(([k]) => k.startsWith('_tib_design_link_'))
        .map(([,v]) => v)
        .filter(u => u && u.startsWith('http'));
      // Les annexes PNG/SVG sont dans les valeurs qui sont des URLs (logos uploadés, etc.)
      const annexeJson = JSON.stringify(
        Object.entries(liAttrs)
          .filter(([k,v]) => !k.startsWith('_') && v && /^https?:\/\//i.test(v))
          .reduce((obj,[k,v]) => { obj[k]=v; return obj; }, {})
      );
      gasOrders.push({
        orderName: order.name,
        quantity: li.quantity,
        note: order.note || '',
        designUrls,
        customizationJson: annexeJson,
      });
    }
  }
  console.log('gasOrders count:', gasOrders.length, 'total designUrls:', gasOrders.reduce((s,o)=>s+o.designUrls.length,0));
  // Debug first order
  if (gasOrders[0]) console.log('First order designUrls:', gasOrders[0].designUrls);

  try {
    const result = await callGas(gasOrders);
    state.printZipDone = true;
    state.printZipOrderIds = selectedOrders.map(o => o.id);

    const zipLinks = result.zips.map(z =>
      `<a href="${z.url}" target="_blank">📦 ${z.name}</a>`
    ).join('<br/>');

    document.getElementById('zip-result-zone').innerHTML = `
      <div class="zip-result" style="margin-top:12px;">
        <div style="font-weight:600;margin-bottom:8px;">✅ ZIP généré dans ton Drive !</div>
        ${zipLinks}
      </div>`;

    // Affiche le bouton étape 3
    renderPrintView();
    showToast('✅ ZIP généré avec succès !');
  } catch(e) {
    btn.disabled = false; btn.textContent = `🗜️ Générer le ZIP (${state.printSelected.size} commande${state.printSelected.size>1?'s':''})`;
    document.getElementById('zip-result-zone').innerHTML = `<div class="alert alert-critical" style="margin-top:8px;"><strong>Erreur :</strong> <span class="alert-text">${e.message}</span></div>`;
  }
}

async function validatePrintOrders() {
  const btn = event.target; btn.disabled = true; btn.textContent = 'Suppression en cours...';
  const today = new Date();
  const printTag = `print_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  const removeMut = `mutation($id:ID!,$tags:[String!]!){tagsRemove(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  const addMut = `mutation($id:ID!,$tags:[String!]!){tagsAdd(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  let ok=0, errors=[];
  for (const id of state.printZipOrderIds) {
    try {
      await gql(removeMut, {id, tags:['TODOPRINT']});
      await gql(addMut, {id, tags:[printTag]});
      ok++;
    }
    catch(e) { errors.push(id); }
  }
  if (errors.length) showToast(`⚠️ Erreurs sur ${errors.length} commande(s)`, 'warning');
  else showToast(`✅ ${ok} commande(s) archivées — tag ${printTag} ajouté`);
  await renderPrintTab();
}
