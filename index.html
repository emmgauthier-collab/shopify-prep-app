async function generatePrintZip() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = '⏳ Génération en cours... (peut prendre 1-2 min)';

  const selectedOrders = state.printOrders.filter(o => state.printSelected.has(o.id));

  // Prépare les données pour le GAS
  const gasOrders = [];
  for (const order of selectedOrders) {
    for (const {node:li} of order.lineItems.edges) {
      const liAttrs = Object.fromEntries((li.customAttributes||[]).map(a=>[a.key,a.value]));
      // Les URLs de design sont dans _tib_design_link_1, _tib_design_link_2, etc.
      const designUrls = Object.entries(liAttrs)
        .filter(([k]) => k.startsWith('_tib_design_link_'))
        .map(([,v]) => v)
        .filter(u => u && u.startsWith('http'));
      // Les annexes PNG/SVG sont dans les valeurs qui sont des URLs (logos uploadés, etc.)
      const annexeJson = JSON.stringify(
        Object.entries(liAttrs)
          .filter(([k,v]) => !k.startsWith('_') && v && /^https?:\/\//i.test(v))
          .reduce((obj,[k,v]) => { obj[k]=v; return obj; }, {})
      );
      gasOrders.push({
        orderName: order.name,
        quantity: li.quantity,
        note: order.note || '',
        designUrls,
        customizationJson: annexeJson,
      });
    }
  }
  console.log('gasOrders count:', gasOrders.length, 'total designUrls:', gasOrders.reduce((s,o)=>s+o.designUrls.length,0));
  // Debug first order
  if (gasOrders[0]) console.log('First order designUrls:', gasOrders[0].designUrls);

  try {
    const result = await callGas(gasOrders);
    state.printZipDone = true;
    state.printZipOrderIds = selectedOrders.map(o => o.id);

    const zipLinks = result.zips.map(z =>
      `<a href="${z.url}" target="_blank">📦 ${z.name}</a>`
    ).join('<br/>');

    document.getElementById('zip-result-zone').innerHTML = `
      <div class="zip-result" style="margin-top:12px;">
        <div style="font-weight:600;margin-bottom:8px;">✅ ZIP généré dans ton Drive !</div>
        ${zipLinks}
      </div>`;

    // Affiche le bouton étape 3
    renderPrintView();
    showToast('✅ ZIP généré avec succès !');
  } catch(e) {
    btn.disabled = false; btn.textContent = `🗜️ Générer le ZIP (${state.printSelected.size} commande${state.printSelected.size>1?'s':''})`;
    document.getElementById('zip-result-zone').innerHTML = `<div class="alert alert-critical" style="margin-top:8px;"><strong>Erreur :</strong> <span class="alert-text">${e.message}</span></div>`;
  }
}

async function validatePrintOrders() {
  const btn = event.target; btn.disabled = true; btn.textContent = 'Suppression en cours...';
  const today = new Date();
  const printTag = `print_${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  const removeMut = `mutation($id:ID!,$tags:[String!]!){tagsRemove(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  const addMut = `mutation($id:ID!,$tags:[String!]!){tagsAdd(id:$id,tags:$tags){node{id}userErrors{message}}}`;
  let ok=0, errors=[];
  for (const id of state.printZipOrderIds) {
    try {
      await gql(removeMut, {id, tags:['TODOPRINT']});
      await gql(addMut, {id, tags:[printTag]});
      ok++;
    }
    catch(e) { errors.push(id); }
  }
  if (errors.length) showToast(`⚠️ Erreurs sur ${errors.length} commande(s)`, 'warning');
  else showToast(`✅ ${ok} commande(s) archivées — tag ${printTag} ajouté`);

  // Enregistre le lot d'impression (historique + commentaire éventuel)
  try {
    const zippedOrders = state.printOrders.filter(o => state.printZipOrderIds.includes(o.id));
    const newLot = {
      lotId: 'lot_' + Date.now(),
      dateGeneration: new Date().toISOString(),
      tag: printTag,
      orderIds: state.printZipOrderIds.slice(),
      orderNames: zippedOrders.map(o => o.name),
      comment: ''
    };
    await addPrintLot(newLot);
  } catch (e) {
    showToast('⚠️ Tag posé mais erreur sauvegarde historique lot: ' + e.message, 'warning');
  }

  // Spinner pendant le rechargement
  document.getElementById('content').innerHTML = `<div class="spinner"><div class="spinner-ring"></div>Mise à jour...</div>`;
  // Petit délai pour laisser Shopify indexer les tags
  await new Promise(r => setTimeout(r, 2000));
  state.printZipOrderIds = [];
  state.printOrders = await fetchTodoPrintOrders();
  // Mise à jour badge
  const badgePrint = document.getElementById('tab-print-badge');
  if (badgePrint) {
    if (state.printOrders.length > 0) { badgePrint.textContent = state.printOrders.length; badgePrint.style.display = ''; }
    else { badgePrint.style.display = 'none'; }
  }
  await renderPrintTab();
}

// Vérifie si la commande courante est traitée — confettis si oui
async function checkCurrentOrderDone() {
  if (state.activeTab !== 'custom') return;
  if (!state.isLoggedIn || !state.proxyUrl) return;
  if (!state.orders.length) return;

  const order = state.orders[state.currentIndex];
  if (!order) return;

  try {
    const data = await gql(`query($id:ID!){ order(id:$id){ id displayFulfillmentStatus tags } }`, { id: order.id });
    const current = data?.order;
    if (!current) return;

    const stillCustom = current.tags.includes('custom');
    const fulfilled = ['FULFILLED','PARTIALLY_FULFILLED'].includes(current.displayFulfillmentStatus);

    if (!stillCustom || fulfilled) {
      launchConfetti();
      showToast('🎉 Commande traitée — suivante !');
      state.orders = state.orders.filter(o => o.id !== order.id);
      setTimeout(() => {
        if (!state.orders.length) { renderCustomTab(); return; }
        if (state.currentIndex >= state.orders.length) state.currentIndex = state.orders.length - 1;
        renderOrderView();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 400);
    }
  } catch(e) {
    // Silencieux
  }
}

async function galleryApi(action, extra) {

    if (res.status === 413 || /request entity too large/i.test(text)) {

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function() {
      const result = reader.result;
      const base64 = result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function resizeImageForUpload(file, maxDim, quality) {
  return new Promise(function(resolve, reject) {
    var url = URL.createObjectURL(file);
    var img = new Image();
    img.onload = function() {
      URL.revokeObjectURL(url);
      var w = img.width, h = img.height;
      var scale = Math.min(1, maxDim / Math.max(w, h));
      var canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(w * scale));
      canvas.height = Math.max(1, Math.round(h * scale));
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(function(blob) {
        if (!blob) { reject(new Error('Redimensionnement impossible')); return; }
        resolve(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = function() { URL.revokeObjectURL(url); reject(new Error('Image illisible')); };
    img.src = url;
  });
}

function removeEditTag(ri,tag){if(!galleryState.savedItems[ri])return;galleryState.savedItems[ri].tags=galleryState.savedItems[ri].tags.filter(function(t){return t!==tag;});renderGalleryUI();setTimeout(function(){startEditTags(ri);},50);}
async function saveEditTags(ri){try{await galleryApi('save',{items:galleryState.savedItems});showToast('Tags sauvegard\u00e9s');galleryState.editingTags=null;renderGalleryUI();}catch(e){showToast('Erreur: '+e.message,'error');}}

function selectAllNiche(niche){var indices=[];galleryState.savedItems.forEach(function(item,ri){if(item.niche===niche)indices.push(ri);});var allSel=indices.every(function(ri){return galleryState.savedSelection.indexOf(ri)>-1;});if(allSel)galleryState.savedSelection=galleryState.savedSelection.filter(function(ri){return indices.indexOf(ri)===-1;});else indices.forEach(function(ri){if(galleryState.savedSelection.indexOf(ri)===-1)galleryState.savedSelection.push(ri);});renderGalleryUI();}
async function applyBulkTag(){var inp=document.getElementById('bulk-tag-input');if(!inp)return;var tag=inp.value.trim().toLowerCase().replace(/,/g,'');if(!tag){showToast('Saisis un tag','warning');return;}galleryState.savedSelection.forEach(function(ri){if(!galleryState.savedItems[ri])return;if(!galleryState.savedItems[ri].tags)galleryState.savedItems[ri].tags=[];if(galleryState.savedItems[ri].tags.indexOf(tag)===-1)galleryState.savedItems[ri].tags.push(tag);});try{await galleryApi('save',{items:galleryState.savedItems});showToast(tag+' ajout\u00e9 \u00e0 '+galleryState.savedSelection.length+' rendu(s)');galleryState.savedSelection=[];galleryState.showBulkTag=false;renderGalleryUI();}catch(e){showToast('Erreur: '+e.message,'error');}}
async function removeBulkTag(){var inp=document.getElementById('bulk-tag-input');if(!inp)return;var tag=inp.value.trim().toLowerCase();if(!tag){showToast('Saisis le tag \u00e0 retirer','warning');return;}galleryState.savedSelection.forEach(function(ri){if(!galleryState.savedItems[ri]||!galleryState.savedItems[ri].tags)return;galleryState.savedItems[ri].tags=galleryState.savedItems[ri].tags.filter(function(t){return t!==tag;});});try{await galleryApi('save',{items:galleryState.savedItems});showToast(tag+' retir\u00e9');galleryState.savedSelection=[];galleryState.showBulkTag=false;renderGalleryUI();}catch(e){showToast('Erreur: '+e.message,'error');}}

function renderBrowsePanel() {
  var el = document.getElementById('gallery-browse-panel');
  if (!el) return;
  var seen = getSeenOrders();
  var imgs = [];
  galleryState.browseOrders.forEach(function(order) {
    order.lineItems.edges.forEach(function(e) {
      var li = e.node; var url = getImageUrl(li); if (!url) return;
      imgs.push({ imageUrl:url, customizationId:getCustId(li),
        productHandle:li.variant&&li.variant.product?li.variant.product.handle:null,
        variantId:li._variantId||null, variantTitle:li._variantTitle||null,
        title:li.title, orderName:order.name, niche:li._niche||null,
        orderId: order.id });
    });
  });
  window._galleryImages = imgs;

  var newCount = imgs.filter(function(img){ return !isAlreadySaved(img.imageUrl); }).length;
  var publishedCount = imgs.filter(function(img){ return isAlreadySaved(img.imageUrl); }).length;

  var h = '';

  // Barre infos + actions
  h += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;padding:10px;background:var(--info-bg);border-radius:var(--radius);border:1px solid var(--border);">';

  if (publishedCount) h += ' &nbsp;\u00b7&nbsp; <span style="color:var(--success);">&#10003; '+publishedCount+' d\u00e9j\u00e0 publi\u00e9s</span>';
  if (newCount) h += ' &nbsp;\u00b7&nbsp; <span style="color:var(--primary);">'+newCount+' \u00e0 traiter</span>';
  h += '</span>';
  h += '<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">';
  if (galleryState.browseHasNext) h += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="loadMoreAndRefresh()">Charger plus (+250)</button>';
  h += '<button class="btn" style="font-size:12px;padding:4px 10px;" onclick="resetBrowse()">&#8635; Recommencer</button>';
  h += '</div></div>';

  // Grille
  if (!imgs.length) {
    h += '<div class="gallery-empty">Aucune image teeinblue trouv\u00e9e';
    var d = galleryState.lastDebug;
    if (d) {
      h += '<div style="margin-top:12px;font-size:11px;text-align:left;background:var(--bg);padding:10px;border-radius:6px;max-width:420px;margin:12px auto 0;">';
      h += (d.totalOrders||0)+' commandes, '+(d.ordersWithImages||0)+' avec images<br>';
      if (d.sampleAttrs&&d.sampleAttrs.length) h += 'Cl\u00e9s : '+d.sampleAttrs.map(function(a){return a.key;}).join(', ');
      if (d.error) h += '<br><span style="color:var(--critical)">'+d.error+'</span>';
      h += '<br><br><button class="btn" style="font-size:11px;padding:4px 8px;" onclick="loadAllOrdersDebug()">Scanner sans filtre</button></div>';
    }
    h += '</div>';
  } else {
    h += '<div class="order-browse-grid">';
    imgs.forEach(function(img, idx) {
      var sel = isInSelection(img.imageUrl);
      var sav = isAlreadySaved(img.imageUrl);
      h += '<div class="order-img-card'+(sel?' selected':'')+'" onclick="toggleSelection('+idx+')" style="opacity:'+(sav?'0.45':'1')+';position:relative;">';
      h += '<img src="'+img.imageUrl+'" alt="" loading="lazy" />';
      if (sav) h += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);"><span style="background:var(--success);color:#fff;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;">&#10003; Publi\u00e9</span></div>';

      h += '<div class="img-check">\u2713</div>';

function parseTeeinblueJson(){
  var raw=document.getElementById('mf-json').value.trim();
  var err=document.getElementById('mf-json-err');
  err.style.display='none';
  if(!raw){err.textContent='Colle d\'abord un JSON dans la zone ci-dessus';err.style.display='block';return;}
  var obj;
  try{obj=JSON.parse(raw);}catch(e){err.textContent='JSON invalide : '+e.message;err.style.display='block';return;}
  // Objet panier complet ({"items":[...]}) : on prend la 1re ligne (ou la 1re qui a une image de customisation)
  if(obj&&Array.isArray(obj.items)&&obj.items.length){
    var withImage=obj.items.find(function(it){
      var p=it.properties||it;
      return p['_customization_image']||p['customization_image']||p['customization-image']||p['Customization Image'];
    });
    obj=withImage||obj.items[0];
  }
  var props=obj.properties||obj;
  function pick(sources,keys){for(var s=0;s<sources.length;s++){var src=sources[s];if(!src)continue;for(var i=0;i<keys.length;i++){if(src[keys[i]])return src[keys[i]];}}return '';}
  var img=pick([props,obj],['_customization_image','customization-image','customization_image','Customization Image']);
  var cid=pick([props,obj],['_customization_id','customization-id','customization_id','_tib_customization_id','tib_customization_id']);
  var hdl=obj.handle||'';
  var vid=obj.variant_id||obj.id||'';
  var ttl=obj.product_title||obj.title||'';
  var filled=[];
  if(img){document.getElementById('mf-img').value=img;filled.push('image');}
  if(cid){document.getElementById('mf-cid').value=cid;filled.push('ID');}
  if(hdl){document.getElementById('mf-hdl').value=hdl;filled.push('handle');}
  if(vid){document.getElementById('mf-vid').value=vid;filled.push('variant');}
  if(ttl){document.getElementById('mf-ttl').value=ttl;filled.push('titre');}
  if(!img&&!cid&&!hdl&&!vid&&!ttl){err.textContent='Aucun champ reconnu dans ce JSON (verifie qu il contient _customization_id / _customization_image / handle...)';err.style.display='block';return;}
  if(!img){err.textContent='Attention : aucune image de customisation trouvee dans cette ligne (peut-etre un frais annexe plutot qu un vrai design) — verifie le champ Image URL avant d\'ajouter.';err.style.display='block';}
  var hay=((hdl||'')+' '+(ttl||'')).toLowerCase();
  var nicheSel=document.getElementById('mf-niche');
  if(hay.indexOf('running')>-1)nicheSel.value='running';
  else if(hay.indexOf('crossfit')>-1||hay.indexOf('hyrox')>-1||hay.indexOf('oversize')>-1||hay.indexOf('crop')>-1||hay.indexOf('tank')>-1||hay.indexOf('debardeur')>-1)nicheSel.value='cf';
  var prev=document.getElementById('mf-prev');if(img){prev.src=img;prev.style.display='block';}
  showToast('Champs remplis : '+filled.join(', '));
}

function renderSelPanel(){
  var allTags=getAllTags();var sel=galleryState.selection;var n=sel.length;
  var h='<div class="gallery-panel-header"><h3>S\u00e9lection ('+n+')</h3>';
  if(n)h+='<button class="btn" style="font-size:12px;padding:4px 8px;" onclick="clearSelection()">Vider</button>';
  h+='</div><div class="gallery-panel-body">';
  if(!n)return h+'<div class="gallery-empty" style="padding:20px;"><div style="font-size:32px">&#128070;</div>Clique sur les images</div></div>';
  h+='<div class="selection-preview">';
  sel.forEach(function(item,idx){
    var col=nicheColor(item.niche);
    var suggs=[];
    if(item.niche==='running'&&(item.tags||[]).indexOf('running')===-1)suggs.push('running');
    if(item.niche==='cf'&&(item.tags||[]).indexOf('crossfit')===-1)suggs.push('crossfit');
    allTags.filter(function(t){return(item.tags||[]).indexOf(t)===-1&&suggs.indexOf(t)===-1;}).slice(0,3).forEach(function(t){suggs.push(t);});
    h+='<div class="sel-item"><img src="'+item.imageUrl+'" alt="" /><div class="sel-item-body"><div class="sel-item-title">';
    if(item.niche)h+='<span style="background:'+col+';color:#fff;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;">'+nicheLabel(item.niche)+'</span>';
    h+=item.title+'</div>';
    if(item.variantTitle&&item.variantTitle!=='Default Title')h+='<div style="font-size:11px;color:var(--text-sub);">'+item.variantTitle+'</div>';
    h+='<div class="sel-item-tags">'+(item.tags||[]).map(function(t){return '<span class="sel-tag">'+t+'<button onclick="removeTagSel('+idx+',\''+t+'\')">&#215;</button></span>';}).join('')+'</div>';
    h+='<div class="tag-input-row"><input type="text" id="ti-'+idx+'" placeholder="Tag..." onkeydown="if(event.key===\'Enter\'||event.key===\',\'){event.preventDefault();addTagSel('+idx+')}" list="tdl-'+idx+'" /><button class="btn" style="padding:4px 8px;font-size:12px;" onclick="addTagSel('+idx+')">+</button></div>';
    h+='<datalist id="tdl-'+idx+'">'+suggs.map(function(t){return '<option value="'+t+'">';}).join('')+'</datalist>';
    if(suggs.length)h+='<div class="tag-suggestions" style="margin-top:4px;">'+suggs.map(function(t){return '<button class="tag-sug-btn" onclick="quickTagSel('+idx+',\''+t+'\')">'+t+'</button>';}).join('')+'</div>';
    h+='</div><button class="sel-item-remove" onclick="removeFromSel('+idx+')">&#x2715;</button></div>';
  });
  return h+'</div></div>';
}

async function uploadManualImage(){
  var fileInput=document.getElementById('mf-img-file');
  var file=fileInput&&fileInput.files[0];
  var err=document.getElementById('mf-err');err.style.display='none';
  if(!file){err.textContent='Choisis d\'abord un fichier image';err.style.display='block';return;}
  try{
    var uploadBlob=file, uploadName=file.name, uploadType=file.type;
    if(file.size>2*1024*1024){
      uploadBlob=await resizeImageForUpload(file,1600,0.85);
      uploadName=file.name.replace(/\.[^.]+$/,'')+'.jpg';
      uploadType='image/jpeg';
    }
    var base64=await fileToBase64(uploadBlob);
    var r=await galleryApi('uploadGalleryImage',{base64Data:base64,filename:uploadName,mimeType:uploadType});
    document.getElementById('mf-img').value=r.imageUrl;
    var prev=document.getElementById('mf-prev');if(prev){prev.src=r.imageUrl;prev.style.display='block';}
    showToast('Image upload\u00e9e !');
  }catch(e){err.textContent='Erreur upload: '+e.message;err.style.display='block';}
}

async function submitManual(){
  var url=document.getElementById('mf-img').value.trim(),cid=document.getElementById('mf-cid').value.trim(),hdl=document.getElementById('mf-hdl').value.trim(),vid=document.getElementById('mf-vid').value.trim(),ttl=document.getElementById('mf-ttl').value.trim()||hdl,niche=document.getElementById('mf-niche').value;
  var tags=document.getElementById('mf-tags').value.split(',').map(function(t){return t.trim().toLowerCase();}).filter(Boolean);
  var isOfficial=document.getElementById('mf-official').checked;
  var alsoInspiration=document.getElementById('mf-also-inspiration').checked;
  var isEditing=galleryState.editingItemIndex!==null&&galleryState.editingItemIndex!==undefined;
  var err=document.getElementById('mf-err');
  if(!url||!cid||!hdl){err.textContent='URL, ID et Handle obligatoires';err.style.display='block';return;}
  if(!tags.length){err.textContent='Au moins un tag';err.style.display='block';return;}
  if(!isEditing&&isAlreadySaved(url)){err.textContent='D\u00e9j\u00e0 dans la galerie';err.style.display='block';return;}
  err.style.display='none';
  try{
    var newItems=galleryState.savedItems.slice();
    var itemData={imageUrl:url,customizationId:cid,productHandle:hdl,variantId:vid||null,title:ttl,niche:niche||null,tags:tags,source:isOfficial?'official':'customer',showInInspiration:alsoInspiration,addedAt:new Date().toISOString()};
    if(isEditing){
      var existing=galleryState.savedItems[galleryState.editingItemIndex];
      itemData.addedAt=(existing&&existing.addedAt)||itemData.addedAt;
      newItems[galleryState.editingItemIndex]=itemData;
    }else{
      newItems.push(itemData);
    }
    await galleryApi('save',{items:newItems});
    galleryState.savedItems=newItems;
    galleryState.showManualForm=false;
    galleryState.editingItemIndex=null;
    showToast(isEditing?'Modifi\u00e9 !':'Ajout\u00e9 !');
    renderGalleryUI();
  }
  catch(e){err.textContent='Erreur: '+e.message;err.style.display='block';}
}

const DELAIS_QUERY = `query {
  shop {
    id
    delaiProduction: metafield(namespace: "custom", key: "delai_production") { value }
    delaiRush: metafield(namespace: "custom", key: "delai_rush") { value }
    delaiPlancher: metafield(namespace: "custom", key: "delai_plancher_fermeture") { value }
    rushProduct: metafield(namespace: "custom", key: "rush_product") { value }
    vacances: metafield(namespace: "custom", key: "vacances") { value }
    fomoActif: metafield(namespace: "custom", key: "fomo_actif") { value }
    fomoTexte: metafield(namespace: "custom", key: "fomo_texte") { value }
    fomoCode: metafield(namespace: "custom", key: "fomo_code") { value }
    fomoFin: metafield(namespace: "custom", key: "fomo_fin") { value }
    alerteImpression: metafield(namespace: "custom", key: "alerte_delai_impression") { value }
    alerteFournisseur: metafield(namespace: "custom", key: "alerte_delai_fournisseur") { value }
  }
}`;

async function renderDelaisFomoTab() {
  const c = document.getElementById('content');
  c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-sub)">Chargement...</div>';
  try {
    await loadDelaisData();

    c.innerHTML = '<div class="empty">Erreur de chargement: ' + e.message + '</div>';
    return;
  }
  renderDelaisUI();

async function loadDelaisData() {
  const data = await gql(DELAIS_QUERY);
  const s = data.shop;
  state.shopGid = s.id;
  const d = state.delais;
  d.delaiProduction = s.delaiProduction ? s.delaiProduction.value : '';
  d.delaiRush = s.delaiRush ? s.delaiRush.value : '';
  d.delaiPlancher = s.delaiPlancher ? s.delaiPlancher.value : '';
  d.alerteImpression = s.alerteImpression ? s.alerteImpression.value : '1';
  d.alerteFournisseur = s.alerteFournisseur ? s.alerteFournisseur.value : '2';
  d.fomoActif = s.fomoActif ? s.fomoActif.value === 'true' : false;
  d.fomoTexte = s.fomoTexte ? s.fomoTexte.value : '';
  d.fomoCode = s.fomoCode ? s.fomoCode.value : '';
  d.fomoFin = s.fomoFin ? s.fomoFin.value : '';

  // Produit rush
  d.rushProductId = ''; d.rushProductTitle = '';
  if (s.rushProduct && s.rushProduct.value) {
    d.rushProductId = s.rushProduct.value;
    try {
      const pdata = await gql('query($id:ID!){ product(id:$id){ title } }', { id: d.rushProductId });
      d.rushProductTitle = pdata.product ? pdata.product.title : '(produit introuvable)';
    } catch (e) { d.rushProductTitle = '(erreur de chargement)'; }
  }

  // Periodes de fermeture
  d.periodes = [];
  d.vacancesGids = [];
  if (s.vacances && s.vacances.value) {
    let gids = [];
    try { gids = JSON.parse(s.vacances.value); } catch (e) { gids = []; }
    d.vacancesGids = gids;
    if (gids.length) {
      const ndata = await gql('query($ids:[ID!]!){ nodes(ids:$ids){ ... on Metaobject { id fields { key value } } } }', { ids: gids });
      d.periodes = (ndata.nodes || []).filter(Boolean).map(function (n) {
        const f = {}; (n.fields || []).forEach(function (fld) { f[fld.key] = fld.value; });
        return { id: n.id, debut: f.debut || '', fin: f.fin || '', label: f.label || '' };
      });
      d.periodes.sort(function (a, b) { return a.debut < b.debut ? -1 : 1; });
    }
  }
  state.delaisLoaded = true;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// Shopify date_time metafields are stored as ISO 8601 (UTC). Convert for the datetime-local input.
function toDatetimeLocal(iso) {
  if (!iso) return '';
  const dt = new Date(iso);
  if (isNaN(dt.getTime())) return '';
  const pad = function (n) { return String(n).padStart(2, '0'); };
  return dt.getFullYear() + '-' + pad(dt.getMonth() + 1) + '-' + pad(dt.getDate()) + 'T' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
}

    '<div class="form-group"><label>D\u00e9lai normal (jours ouvr\u00e9s)</label><input type="number" id="df-delai-production" value="' + escapeHtml(d.delaiProduction) + '"></div>' +
    '<div class="form-group"><label>D\u00e9lai rush (jours ouvr\u00e9s) \u2014 laisser vide si non disponible</label><input type="number" id="df-delai-rush" value="' + escapeHtml(d.delaiRush) + '"></div>' +
    '<div class="form-group"><label>Plancher avant fermeture (jours ouvr\u00e9s)</label><input type="number" id="df-delai-plancher" value="' + escapeHtml(d.delaiPlancher) + '"><div class="settings-hint">En dessous de ce seuil, on arr\u00eate de r\u00e9duire le d\u00e9lai annonc\u00e9 \u00e0 l\u2019approche d\u2019une fermeture.</div></div>' +
    '<div class="form-group"><label>Produit qui active le rush</label>' +
    (d.rushProductId ? '<div class="settings-hint" style="margin-bottom:6px;">Actuel: <strong>' + escapeHtml(d.rushProductTitle) + '</strong></div>' : '<div class="settings-hint" style="margin-bottom:6px;">Aucun produit rush configur\u00e9</div>') +
    '<input type="text" id="df-rush-search" placeholder="Rechercher un produit par titre..." oninput="searchRushProductDebounced(this.value)">' +
    '<div id="df-rush-results"></div>' +
    '</div>' +
    '<button class="btn btn-primary" onclick="saveDelaisBase()">Enregistrer les d\u00e9lais</button>' +
    '</div>' +

    '<div class="card">' +
    '<div class="card-title">\uD83D\uDEA8 Alertes de retard</div>' +
    '<div class="settings-hint" style="margin-bottom:8px;">Signale, sur le tableau de bord et les onglets concern\u00e9s, les commandes dont l\u2019\u00e9ch\u00e9ance approche alors que l\u2019impression ou la commande fournisseur n\u2019a pas encore \u00e9t\u00e9 faite.</div>' +
    '<div class="form-group"><label>Alerte impression \u2014 seuil (jours avant \u00e9ch\u00e9ance)</label><input type="number" step="0.5" id="df-alerte-impression" value="' + escapeHtml(d.alerteImpression) + '"><div class="settings-hint">D\u00e9clenche une alerte si une commande a encore la balise TODOPRINT \u00e0 moins de ce nombre de jours de l\u2019\u00e9ch\u00e9ance.</div></div>' +
    '<div class="form-group"><label>Alerte commande fournisseur \u2014 seuil (jours avant \u00e9ch\u00e9ance)</label><input type="number" step="0.5" id="df-alerte-fournisseur" value="' + escapeHtml(d.alerteFournisseur) + '"><div class="settings-hint">D\u00e9clenche une alerte si une commande a encore la balise TOORDER \u00e0 moins de ce nombre de jours de l\u2019\u00e9ch\u00e9ance.</div></div>' +
    '<button class="btn btn-primary" onclick="saveAlertesRetard()">Enregistrer les alertes</button>' +
    '</div>' +

    '<div class="card">' +
    '<div class="card-title">\uD83D\uDD25 Bandeau FOMO (page produit personnalisation) ' + fomoStatusBadge + '</div>' +
    '<div class="form-group"><label><input type="checkbox" id="df-fomo-actif" ' + (d.fomoActif ? 'checked' : '') + ' style="width:16px;height:16px;vertical-align:middle;margin-right:6px;accent-color:var(--primary);"> Bandeau actif</label></div>' +
    '<div class="form-group"><label>Texte de l\u2019offre</label><input type="text" id="df-fomo-texte" value="' + escapeHtml(d.fomoTexte) + '" placeholder="ex: -10% sur ta personnalisation"></div>' +
    '<div class="form-group"><label>Code promo (laisser vide = pas de code affich\u00e9)</label><input type="text" id="df-fomo-code" value="' + escapeHtml(d.fomoCode) + '"></div>' +
    '<div class="form-group"><label>Fin de l\u2019offre</label><input type="datetime-local" id="df-fomo-fin" value="' + toDatetimeLocal(d.fomoFin) + '"><div class="settings-hint">Sert au compte \u00e0 rebours, masque automatiquement le bandeau une fois pass\u00e9e.</div></div>' +
    '<button class="btn btn-primary" onclick="saveFomo()">Enregistrer le FOMO</button>' +
    '</div>' +

    '<div class="card">' +
    '<div class="card-title">\uD83C\uDFD6\uFE0F P\u00e9riodes de fermeture (vacances)</div>' +
    '<div class="settings-hint" style="margin-bottom:8px;">D\u00e9cale automatiquement les d\u00e9lais affich\u00e9s sur le site pendant ces p\u00e9riodes.</div>' +
    periodesHtml +
    (state.delaisShowAddPeriode ? addFormHtml : '<button class="btn" style="margin-top:10px;" onclick="state.delaisShowAddPeriode=true;renderDelaisUI();">+ Ajouter une p\u00e9riode</button>') +
    '</div>' +

    '<div class="card">' +
    '<div class="card-title">\uD83D\uDD17 Webhook commande \u2192 date limite</div>' +
    '<div class="settings-hint" style="margin-bottom:8px;">Cr\u00e9e (une seule fois) le webhook <code>orders/create</code> qui \u00e9crit automatiquement <code>custom.date_limite_traitement</code> et <code>custom.est_rush</code> sur chaque nouvelle commande.</div>' +
    '<button class="btn btn-primary" onclick="setupOrderWebhook()">V\u00e9rifier / activer le webhook</button>' +
    '<div id="df-webhook-status" style="margin-top:10px;font-size:13px;"></div>' +
    '</div>';
}

async function metafieldsSetOne(key, value, type, namespace) {
  namespace = namespace || 'custom';
  const mutation = 'mutation($mf:[MetafieldsSetInput!]!){ metafieldsSet(metafields:$mf){ metafields{ id } userErrors{ field message } } }';
  const vars = { mf: [{ ownerId: state.shopGid, namespace: namespace, key: key, value: String(value), type: type }] };
  const data = await gql(mutation, vars);
  const errs = data.metafieldsSet.userErrors;
  if (errs && errs.length) throw new Error(errs.map(function (e) { return e.message; }).join(', '));
}

async function ensureShopGid() {
  if (state.shopGid) return state.shopGid;
  const data = await gql('query{ shop{ id } }');
  state.shopGid = data.shop.id;
  return state.shopGid;
}

async function saveDelaisBase() {
  const prod = document.getElementById('df-delai-production').value.trim();
  const rush = document.getElementById('df-delai-rush').value.trim();
  const plancher = document.getElementById('df-delai-plancher').value.trim();
  try {
    if (prod !== '') await metafieldsSetOne('delai_production', prod, 'number_integer');
    if (rush !== '') await metafieldsSetOne('delai_rush', rush, 'number_integer');
    if (plancher !== '') await metafieldsSetOne('delai_plancher_fermeture', plancher, 'number_integer');
    showToast('D\u00e9lais enregistr\u00e9s');
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

async function saveAlertesRetard() {
  const alerteImpression = document.getElementById('df-alerte-impression').value.trim();
  const alerteFournisseur = document.getElementById('df-alerte-fournisseur').value.trim();
  try {
    if (alerteImpression !== '') await metafieldsSetOne('alerte_delai_impression', alerteImpression, 'number_decimal');
    if (alerteFournisseur !== '') await metafieldsSetOne('alerte_delai_fournisseur', alerteFournisseur, 'number_decimal');
    showToast('Seuils d\u2019alerte enregistr\u00e9s');
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

let _rushSearchTimer = null;
function searchRushProductDebounced(term) {
  clearTimeout(_rushSearchTimer);
  _rushSearchTimer = setTimeout(function () { searchRushProduct(term); }, 350);
}
async function searchRushProduct(term) {
  const box = document.getElementById('df-rush-results');
  if (!term || term.trim().length < 2) { if (box) box.innerHTML = ''; return; }
  try {
    const data = await gql('query($q:String!){ products(first:8, query:$q){ edges{ node{ id title } } } }', { q: 'title:*' + term.trim() + '*' });
    const edges = data.products.edges || [];
    if (!box) return;
    if (!edges.length) { box.innerHTML = '<div class="settings-hint">Aucun r\u00e9sultat</div>'; return; }
    box.innerHTML = edges.map(function (e) {
      return '<div style="padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius);margin-top:4px;cursor:pointer;" onclick="selectRushProduct(\'' + e.node.id + '\',\'' + escapeHtml(e.node.title).replace(/'/g, "\\'") + '\')">' + escapeHtml(e.node.title) + '</div>';
    }).join('');
  } catch (e) { if (box) box.innerHTML = '<div class="settings-hint">Erreur: ' + e.message + '</div>'; }
}
async function selectRushProduct(id, title) {
  try {
    await metafieldsSetOne('rush_product', id, 'product_reference');
    showToast('Produit rush mis \u00e0 jour');
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

async function saveFomo() {
  const actif = document.getElementById('df-fomo-actif').checked;
  const texte = document.getElementById('df-fomo-texte').value.trim();
  const code = document.getElementById('df-fomo-code').value.trim();
  const finLocal = document.getElementById('df-fomo-fin').value;
  try {
    await metafieldsSetOne('fomo_actif', actif, 'boolean');
    await metafieldsSetOne('fomo_texte', texte, 'single_line_text_field');
    await metafieldsSetOne('fomo_code', code, 'single_line_text_field');
    if (finLocal) {
      const iso = new Date(finLocal).toISOString();
      await metafieldsSetOne('fomo_fin', iso, 'date_time');
    }
    showToast('FOMO enregistr\u00e9');
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

async function savePeriode() {
  const debut = document.getElementById('np-debut').value;
  const fin = document.getElementById('np-fin').value;
  const label = document.getElementById('np-label').value.trim();
  if (!debut || !fin) { showToast('D\u00e9but et fin requis', 'warning'); return; }
  try {
    const fields = [{ key: 'debut', value: debut }, { key: 'fin', value: fin }];
    if (label) fields.push({ key: 'label', value: label });
    const data = await gql(
      'mutation($input:MetaobjectCreateInput!){ metaobjectCreate(metaobject:$input){ metaobject{ id } userErrors{ field message } } }',
      { input: { type: 'rx_periode_fermeture', fields: fields } }
    );
    const errs = data.metaobjectCreate.userErrors;
    if (errs && errs.length) throw new Error(errs.map(function (e) { return e.message; }).join(', '));
    const newId = data.metaobjectCreate.metaobject.id;
    const gids = state.delais.vacancesGids.concat([newId]);
    await metafieldsSetOne('vacances', JSON.stringify(gids), 'list.metaobject_reference');
    showToast('P\u00e9riode ajout\u00e9e');
    state.delaisShowAddPeriode = false;
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

async function deletePeriode(id) {
  if (!confirm('Supprimer cette p\u00e9riode de fermeture ?')) return;
  try {
    const gids = state.delais.vacancesGids.filter(function (g) { return g !== id; });
    await metafieldsSetOne('vacances', JSON.stringify(gids), 'list.metaobject_reference');
    await gql('mutation($id:ID!){ metaobjectDelete(id:$id){ deletedId userErrors{ field message } } }', { id: id });
    showToast('P\u00e9riode supprim\u00e9e');
    await loadDelaisData(); renderDelaisUI();
  } catch (e) { showToast('Erreur: ' + e.message, 'error'); }
}

// Enregistre (ou verifie) le webhook orders/create qui pointe vers
// /api/order-delai-webhook. Utilise le proxy /api/shopify existant, donc le
// webhook est bien cree par l'app prep-orders (meme secret que la verification HMAC).
async function setupOrderWebhook() {
  const box = document.getElementById('df-webhook-status');
  box.innerHTML = 'V\u00e9rification...';
  const callbackUrl = window.location.origin + '/api/order-delai-webhook';
  try {
    const existing = await gql('query { webhookSubscriptions(first: 50, topics: [ORDERS_CREATE]) { edges { node { id endpoint { __typename ... on WebhookHttpEndpoint { callbackUrl } } } } } }');
    const already = (existing.webhookSubscriptions.edges || []).find(function (e) {
      return e.node.endpoint && e.node.endpoint.callbackUrl === callbackUrl;
    });
    if (already) {
      box.innerHTML = '<span style="color:#2d7a35">D\u00e9j\u00e0 actif sur ' + escapeHtml(callbackUrl) + '</span>';
      return;
    }
    const data = await gql(
      'mutation($topic:WebhookSubscriptionTopic!, $sub:WebhookSubscriptionInput!){ webhookSubscriptionCreate(topic:$topic, webhookSubscription:$sub){ webhookSubscription{ id } userErrors{ field message } } }',
      { topic: 'ORDERS_CREATE', sub: { callbackUrl: callbackUrl, format: 'JSON' } }
    );
    const errs = data.webhookSubscriptionCreate.userErrors;
    if (errs && errs.length) { box.innerHTML = '<span style="color:var(--critical,#c0392b)">Erreur: ' + escapeHtml(errs.map(function (e) { return e.message; }).join(', ')) + '</span>'; return; }
    box.innerHTML = '<span style="color:#2d7a35">Webhook activ\u00e9 sur ' + escapeHtml(callbackUrl) + '</span>';
    showToast('Webhook activ\u00e9');
  } catch (e) {
    box.innerHTML = '<span style="color:var(--critical,#c0392b)">Erreur: ' + escapeHtml(e.message) + '</span>';
  }
}
